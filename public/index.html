<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Versicherungs-Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .app {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .section {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .insurance-list {
            display: grid;
            gap: 15px;
        }

        .insurance-card {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .insurance-card:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .insurance-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .insurance-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            color: #666;
            font-size: 0.95em;
        }

        .info-label {
            font-weight: bold;
            color: #333;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .delete-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .chat-area {
            background: #f8f9ff;
            border-radius: 10px;
            border: 1px solid #e0e0ff;
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            padding: 12px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .chat-message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .chat-message.agent {
            background: white;
            color: #333;
            border: 1px solid #e0e0ff;
            align-self: flex-start;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #e0e0ff;
            background: white;
            border-radius: 0 0 10px 10px;
        }

        #chatInput {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e0e0ff;
            border-radius: 8px;
            font-size: 0.95em;
        }

        #chatInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Versicherungs-Manager</h1>
            <p>Verwalte deine Versicherungen intelligent mit KI</p>
        </header>

        <div class="app">
            <!-- Upload Section -->
            <div class="section">
                <h2>📄 Versicherungs-Police hinzufügen</h2>
                <div id="status"></div>
                
                <div class="upload-area" onclick="document.getElementById('pdfInput').click()">
                    <p>📁 Klick hier oder zieh eine PDF-Datei rein</p>
                    <p style="font-size: 0.9em; color: #999;">Deine Police wird automatisch analysiert</p>
                    <input type="file" id="pdfInput" accept=".pdf">
                </div>
                
                <button onclick="analyzeAndSave()" id="analyzeBtn" disabled>
                    🤖 PDF analysieren
                </button>
            </div>

            <!-- Chat Section -->
            <div class="section">
                <h2>💬 Frag den Agent</h2>
                <div id="chatArea" class="chat-area">
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input 
                            type="text" 
                            id="chatInput" 
                            placeholder="Stell eine Frage zu deinen Versicherungen..."
                        >
                        <button onclick="sendChatMessage()">📤 Senden</button>
                    </div>
                </div>
            </div>

            <!-- Insurance List Section -->
            <div class="section">
                <h2>📋 Deine Versicherungen</h2>
                <div id="insuranceList" class="insurance-list"></div>
            </div>

            <!-- Summary Section -->
            <div class="section">
                <div id="summary" class="summary"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        document.getElementById('pdfInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            document.getElementById('analyzeBtn').disabled = !selectedFile;
        });

        async function analyzeAndSave() {
            if (!selectedFile) return;

            showStatus('🔄 Analysiere PDF...', 'loading');
            document.getElementById('analyzeBtn').disabled = true;

            try {
                const response = await fetch('/api/analyze-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: selectedFile.name })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('✅ PDF analysiert! Speichere Daten...', 'loading');
                    
                    const saveResponse = await fetch('/api/save-insurance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(result.data)
                    });

                    if (saveResponse.ok) {
                        showStatus('✅ Versicherung gespeichert!', 'success');
                        selectedFile = null;
                        document.getElementById('pdfInput').value = '';
                        document.getElementById('analyzeBtn').disabled = true;
                        loadInsurances();
                    }
                } else {
                    showStatus(`❌ Fehler: ${result.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Fehler: ${error.message}`, 'error');
            }

            document.getElementById('analyzeBtn').disabled = false;
        }

        async function loadInsurances() {
            try {
                const response = await fetch('/api/insurances');
                const insurances = await response.json();

                const listDiv = document.getElementById('insuranceList');
                const summaryDiv = document.getElementById('summary');

                if (insurances.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">📭 Noch keine Versicherungen gespeichert</div>';
                    summaryDiv.innerHTML = '';
                    return;
                }

                listDiv.innerHTML = insurances.map(ins => `
                    <div class="insurance-card">
                        <h3>${ins.name}</h3>
                        <div class="insurance-info">
                            <div class="info-item">
                                <div class="info-label">Typ</div>
                                ${ins.type}
                            </div>
                            <div class="info-item">
                                <div class="info-label">Kosten</div>
                                ${ins.monthly_cost}€/Monat
                            </div>
                            <div class="info-item">
                                <div class="info-label">Ablauf</div>
                                ${ins.expiry_date}
                            </div>
                            <div class="info-item">
                                <div class="info-label">Anbieter</div>
                                ${ins.provider}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteInsurance(${ins.id})">🗑️ Löschen</button>
                    </div>
                `).join('');

                const totalMonthly = insurances.reduce((sum, i) => sum + (i.monthly_cost || 0), 0);
                const totalYearly = totalMonthly * 12;

                summaryDiv.innerHTML = `
                    <div class="summary-item">
                        <span>💰 Monatliche Kosten:</span>
                        <strong>${totalMonthly.toFixed(2)}€</strong>
                    </div>
                    <div class="summary-item">
                        <span>📅 Jährliche Kosten:</span>
                        <strong>${totalYearly.toFixed(2)}€</strong>
                    </div>
                    <div class="summary-item">
                        <span>📊 Versicherungen:</span>
                        <strong>${insurances.length}</strong>
                    </div>
                `;
            } catch (error) {
                console.error('Fehler:', error);
            }
        }

        async function deleteInsurance(id) {
            if (confirm('Soll diese Versicherung wirklich gelöscht werden?')) {
                try {
                    await fetch('/api/delete-insurance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    loadInsurances();
                    showStatus('✅ Versicherung gelöscht!', 'success');
                } catch (error) {
                    showStatus(`❌ Fehler: ${error.message}`, 'error');
                }
            }
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            addChatMessage(message, 'user');
            input.value = '';

            addChatMessage('⏳ Der Agent denkt nach...', 'agent');

            fetch('/api/ask-agent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: message })
            })
            .then(response => response.json())
            .then(result => {
                const messages = document.getElementById('chatMessages');
                const lastMessage = messages.lastChild;
                if (lastMessage && lastMessage.textContent.includes('⏳')) {
                    lastMessage.remove();
                }

                if (result.success) {
                    addChatMessage(result.answer, 'agent');
                } else {
                    addChatMessage(`❌ Fehler: ${result.error}`, 'agent');
                }
            })
            .catch(error => {
                const messages = document.getElementById('chatMessages');
                const lastMessage = messages.lastChild;
                if (lastMessage && lastMessage.textContent.includes('⏳')) {
                    lastMessage.remove();
                }
                addChatMessage(`❌ Fehler: ${error.message}`, 'agent');
            });
        }

        function addChatMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            if (type === 'success') {
                setTimeout(() => statusDiv.innerHTML = '', 5000);
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });

        loadInsurances();
    </script>
</body>
</html>
